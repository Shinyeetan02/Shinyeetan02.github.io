<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寂寞的小兔子 - 水彩繪本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f3f4f6;
            font-family: "Noto Sans TC", sans-serif;
        }

        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景圖層：直接讀取本地檔案 */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('watercolor_classroom_background.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .character-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 水彩風格濾鏡 */
        .watercolor-filter {
            filter: url(#watercolor);
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- 背景圖層 -->
        <div class="background-image"></div>

        <!-- 角色層 (SVG) -->
        <svg class="character-overlay" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <defs>
                <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
                    <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" result="noise" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" />
                    <feGaussianBlur stdDeviation="1" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <!-- 右側：小白兔 (全身、佔比放大、悲傷、拿書) -->
            <g class="watercolor-filter" transform="translate(580, 420) scale(1.0)">
                <!-- 陰影 -->
                <ellipse cx="20" cy="65" rx="45" ry="12" fill="rgba(0,0,0,0.08)" />
                <!-- 耳朵 (悲傷下垂) -->
                <ellipse cx="5" cy="-5" rx="6" ry="25" fill="#ffffff" transform="rotate(-15)" />
                <ellipse cx="35" cy="-5" rx="6" ry="25" fill="#ffffff" transform="rotate(15)" />
                <!-- 身體 -->
                <path d="M 0 60 Q 20 0 40 60 Z" fill="#ffffff" />
                <circle cx="20" cy="20" r="22" fill="#ffffff" />
                <!-- 悲傷的眼 -->
                <path d="M 10 22 Q 15 26 20 22" stroke="#64748b" stroke-width="1.5" fill="none" />
                <path d="M 22 22 Q 27 26 32 22" stroke="#64748b" stroke-width="1.5" fill="none" />
                <path d="M 18 30 L 20 32 L 22 30" stroke="#fca5a5" stroke-width="1.5" fill="none" />
                <!-- 手裡的書 -->
                <rect x="-5" y="35" width="30" height="35" fill="#475569" rx="2" transform="rotate(-10)" />
                <line x1="0" y1="42" x2="20" y2="42" stroke="#94a3b8" stroke-width="1" transform="rotate(-10)" />
                <line x1="0" y1="47" x2="20" y2="47" stroke="#94a3b8" stroke-width="1" transform="rotate(-10)" />
                <!-- 尾巴 -->
                <circle cx="45" cy="55" r="7" fill="#f8fafc" />
            </g>

            <!-- 左側：黑色兔子 (透過 image 讀取外部檔案) -->
            <image 
                class="watercolor-filter" 
                href="blackrabbit-test_工作區域 1.svg" 
                x="120" y="300" 
                width="250" height="250"
            />
        </svg>
    </div>

</body>
</html>
