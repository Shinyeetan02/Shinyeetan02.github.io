<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寂寞的小兔子 - 景深故事</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #f3f4f6;
            font-family: "Noto Sans TC", sans-serif;
        }

        /* 捲動空間：決定動畫的長度 */
        .scroll-container {
            height: 400vh; /* 增加捲動空間讓動畫更細膩 */
            position: relative;
            z-index: 1;
        }

        #app {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        /* 背景圖層 */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('watercolor_classroom_background.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            /* 初始狀態由 JS 接管，這裡設定基礎濾鏡 */
            filter: blur(10px);
            will-change: filter;
        }

        .character-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* 小白兔群組：初始模糊 */
        #white-rabbit-group {
            filter: blur(15px);
            will-change: filter;
        }

        /* 黑色兔子：永遠保持清晰 */
        #black-rabbit-group {
            filter: none !important;
        }
    </style>
</head>
<body>

    <!-- 視覺顯示區域 (固定) -->
    <div id="app">
        <!-- 背景圖層 -->
        <div id="bg" class="background-image"></div>

        <!-- 角色層 (SVG) -->
        <svg class="character-overlay" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            
            <!-- 右側：小白兔 (全身、悲傷、拿書) -->
            <g id="white-rabbit-group" transform="translate(580, 420) scale(1.0)">
                <!-- 陰影 -->
                <ellipse cx="20" cy="65" rx="45" ry="12" fill="rgba(0,0,0,0.08)" />
                <!-- 耳朵 -->
                <ellipse cx="5" cy="-5" rx="6" ry="25" fill="#ffffff" transform="rotate(-15)" />
                <ellipse cx="35" cy="-5" rx="6" ry="25" fill="#ffffff" transform="rotate(15)" />
                <!-- 身體 -->
                <path d="M 0 60 Q 20 0 40 60 Z" fill="#ffffff" />
                <circle cx="20" cy="20" r="22" fill="#ffffff" />
                <!-- 臉部細節 -->
                <path d="M 10 22 Q 15 26 20 22" stroke="#64748b" stroke-width="1.5" fill="none" />
                <path d="M 22 22 Q 27 26 32 22" stroke="#64748b" stroke-width="1.5" fill="none" />
                <path d="M 18 30 L 20 32 L 22 30" stroke="#fca5a5" stroke-width="1.5" fill="none" />
                <!-- 書本 -->
                <rect x="-5" y="35" width="30" height="35" fill="#475569" rx="2" transform="rotate(-10)" />
                <line x1="0" y1="42" x2="20" y2="42" stroke="#94a3b8" stroke-width="1" transform="rotate(-10)" />
                <line x1="0" y1="47" x2="20" y2="47" stroke="#94a3b8" stroke-width="1" transform="rotate(-10)" />
                <!-- 尾巴 -->
                <circle cx="45" cy="55" r="7" fill="#f8fafc" />
            </g>

            <!-- 左側：黑色兔子 (讀取外部檔案) -->
            <g id="black-rabbit-group">
                <image 
                    href="blackrabbit-test_工作區域 1.svg" 
                    x="120" y="300" 
                    width="350" height="350"
                />
            </g>
        </svg>
    </div>

    <!-- 用於產生捲動軸的空間 -->
    <div class="scroll-container"></div>

    <script>
        const bg = document.getElementById('bg');
        const whiteRabbit = document.getElementById('white-rabbit-group');

        let ticking = false;

        function updateElements() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight;
            const windowHeight = window.innerHeight;
            
            // 計算最大可捲動距離
            const maxScroll = scrollHeight - windowHeight;
            
            // 安全檢查，防止除以零
            if (maxScroll <= 0) return;

            // 計算捲動百分比 (0 到 1)
            const scrollPercent = Math.max(0, Math.min(scrollTop / maxScroll, 1));

            // 1. 小白兔景深切換：從 15px 模糊 變為 0px 清晰
            const whiteBlur = 15 * (1 - scrollPercent);
            whiteRabbit.style.filter = `blur(${whiteBlur}px)`;

            // 2. 背景景深切換：從 10px 模糊 變為 0px 清晰
            const bgBlur = 10 * (1 - scrollPercent);
            bg.style.filter = `blur(${bgBlur}px)`;

            ticking = false;
        }

        // 使用 requestAnimationFrame 優化效能
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateElements();
                });
                ticking = true;
            }
        });

        // 監聽視窗縮放，重新計算動畫位置
        window.addEventListener('resize', updateElements);

        // 初始化狀態
        document.addEventListener('DOMContentLoaded', updateElements);
        // 強制執行一次以修正初始載入位置
        updateElements();
    </script>
</body>
</html>
