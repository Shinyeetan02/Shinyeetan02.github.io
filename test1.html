<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寂寞的小兔子 - 景深測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 禁用捲動 */
            background-color: #f3f4f6;
            font-family: "Noto Sans TC", sans-serif;
            cursor: pointer; /* 提示使用者可以點擊 */
        }

        #app {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* 背景圖層（HTML 元素，Safari 支援 CSS filter） */
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('watercolor_classroom_background.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            filter: blur(10px);
            transition: filter 2s ease-in-out;
            will-change: filter;
        }

        .character-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 針對 Safari 優化：使用 SVG 濾鏡 ID */
        #white-rabbit-group {
            filter: url(#svgBlurFilter); /* 使用原生 SVG 濾鏡 */
        }

        /* 黑色兔子：永遠保持清晰 */
        #black-rabbit-group {
            filter: none !important;
        }

        /* 清晰狀態的類別 */
        .is-focused #bg {
            filter: blur(0px);
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            letter-spacing: 0.2rem;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .hint.visible {
            opacity: 0.6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* 開場文字樣式 */
        #intro-text-element {
            font-size: 24px;
            fill: #475569;
            font-weight: 300;
            letter-spacing: 0.2rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body onclick="toggleFocus()">

    <div id="app">
        <!-- 背景圖層 -->
        <div id="bg" class="background-image"></div>

        <!-- 角色層 (SVG) -->
        <svg class="character-overlay" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <defs>
                <!-- 原生 SVG 濾鏡：這是 Safari 唯一 100% 支援的 SVG 模糊方式 -->
                <filter id="svgBlurFilter">
                    <feGaussianBlur id="blurElement" stdDeviation="15" />
                </filter>
            </defs>
            
            <!-- 右側：小白兔 -->
            <g id="white-rabbit-group" transform="translate(580, 420) scale(1.0)">
                <ellipse cx="20" cy="65" rx="45" ry="12" fill="rgba(0,0,0,0.08)" />
                <ellipse cx="5" cy="-5" rx="6" ry="25" fill="#ffffff" transform="rotate(-15)" />
                <ellipse cx="35" cy="-5" rx="6" ry="25" fill="#ffffff" transform="rotate(15)" />
                <path d="M 0 60 Q 20 0 40 60 Z" fill="#ffffff" />
                <circle cx="20" cy="20" r="22" fill="#ffffff" />
                <path d="M 10 22 Q 15 26 20 22" stroke="#64748b" stroke-width="1.5" fill="none" />
                <path d="M 22 22 Q 27 26 32 22" stroke="#64748b" stroke-width="1.5" fill="none" />
                <path d="M 18 30 L 20 32 L 22 30" stroke="#fca5a5" stroke-width="1.5" fill="none" />
                <rect x="-5" y="35" width="30" height="35" fill="#475569" rx="2" transform="rotate(-10)" />
                <line x1="0" y1="42" x2="20" y2="42" stroke="#94a3b8" stroke-width="1" transform="rotate(-10)" />
                <line x1="0" y1="47" x2="20" y2="47" stroke="#94a3b8" stroke-width="1" transform="rotate(-10)" />
                <circle cx="45" cy="55" r="7" fill="#f8fafc" />
            </g>

            <!-- 左側：黑色兔子 -->
            <g id="black-rabbit-group">
                <text id="intro-text-element" x="300" y="320" text-anchor="middle"></text>
                <image 
                    href="blackrabbit-test_工作區域 1.svg" 
                    x="120" y="300" 
                    width="350" height="350"
                />
            </g>
        </svg>
    </div>

    <div class="hint" id="hintText">點擊畫面看看</div>

    <script>
        let focused = false;
        const introString = "小白兔在做什麼呢？";
        const introElement = document.getElementById('intro-text-element');
        const hintElement = document.getElementById('hintText');
        const blurElement = document.getElementById('blurElement');

        function typeIntroText() {
            let i = 0;
            const timer = setInterval(() => {
                if (i < introString.length) {
                    introElement.textContent += introString.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        hintElement.classList.add('visible');
                    }, 500);
                }
            }, 150);
        }

        // 動畫化 SVG 濾鏡數值的函式
        function animateBlur(start, end, duration) {
            const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease In Out 四次方的緩動效果
                const easeProgress = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                
                const currentValue = start + (end - start) * easeProgress;
                blurElement.setAttribute('stdDeviation', currentValue);

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        function toggleFocus() {
            if (!hintElement.classList.contains('visible')) return;

            focused = !focused;
            const app = document.getElementById('app');
            const hint = document.getElementById('hintText');
            
            if (focused) {
                app.classList.add('is-focused');
                hint.textContent = " ";
                // 將 SVG 濾鏡從 15 變為 0
                animateBlur(15, 0, 2000);
            } else {
                app.classList.remove('is-focused');
                hint.textContent = "點擊畫面看看";
                // 將 SVG 濾鏡從 0 變為 15
                animateBlur(0, 15, 2000);
            }
        }

        window.onload = typeIntroText;
    </script>
</body>
</html>
