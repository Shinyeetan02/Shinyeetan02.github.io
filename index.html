<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1142數位圖像敘事與創作</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- main -->
    <div class="scene1-container">
        <video id="scene1" src="assets/scene1.mp4" preload="auto" muted playsinline></video>
        <div class="title">失眠 不焦慮</div>
        <button id="playBtn">進入故事</button>
    </div>
    <div class="scene2-container">
        <video id="scene2" src="assets/scene2.mp4" preload="auto" muted playsinline></video>
        <img id="hintScrolling-img" src="assets/hintScrolling.png">
        <div class="hint">請向下滑動畫面</div>
    </div>
    <div class="scene3-container">
        <video id="scene3" src="assets/scene3.mp4" preload="auto" muted playsinline></video>
        <img id="scene3-img" src="assets/scene3-3.png">
        <img id="hintClick-img" src="assets/hintClick.png">
        <button id="phoneBtn"></button>
    </div>
    <div class="scene4-container">
        <video id="scene4" src="assets/scene4.mp4" preload="auto" muted playsinline></video>
    </div>

    <!-- captions -->
    <div class="captions">
        <p id="caption1">一隻綿羊...</p>
        <p id="caption2">兩隻綿羊...</p>
        <p id="caption3">三隻綿羊...</p>
        <p id="caption4">這裡怎麼會有個大洞口？</p>
    </div>
    <div class="scene3-captions">
        <p id="caption5">看來小兔還是睡不著</p>
        <p id="caption6">好奇現在幾點了</p>
        <p id="caption7">打開手機看看吧～</p>
    </div>

    <!-- 载入 GSAP 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="gsap.js"></script>

        <!-- 手機尺寸提示 -->
    <div id="mobile-notice" style="
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #fff;
        color: #222222;
        font-size: 20px;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        justify-content: center;
        align-items: center;
        padding: 40px;
        box-sizing: border-box;
        z-index: 9999;
        line-height: 1.8;
    ">
        抱歉!本專案尚未進行 RWD 設計<br>請使用電腦進行體驗
    </div>
    <script>
        function checkMobile() {
            const notice = document.getElementById('mobile-notice')
            if (window.innerWidth < 768) {
                notice.style.display = 'flex'
                document.body.style.overflow = 'hidden'
            } else {
                notice.style.display = 'none'
            }
        }
        checkMobile()
        window.addEventListener('resize', checkMobile)
    </script>
</body>
</html>
