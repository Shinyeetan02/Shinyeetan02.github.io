<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寂寞的小兔子 - 互動故事</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a1221; /* 牆壁底色 */
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: "Noto Sans TC", sans-serif;
        }

        /* 滾動用的長度：增加長度讓滾動感更細膩 */
        .scroll-space {
            height: 600vh;
        }

        /* 底層：牆壁裝飾或陰影 */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 5;
            background: radial-gradient(circle at 50% 50%, #0d1a30 0%, #050a14 100%);
            pointer-events: none;
        }

        /* 中層：文字容器 (z-index: 10) */
        .story-text-container {
            position: fixed;
            top: 50%; /* 位於畫面中心稍偏上的位置 */
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            gap: 20px;
            pointer-events: none;
            white-space: nowrap;
        }

        .char {
            color: rgba(255, 255, 255, 0.85);
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.5rem;
            opacity: 0;
            filter: blur(15px);
            transition: opacity 1s ease, transform 1s ease, filter 1s ease;
            transform: scale(0.3); /* 初始縮小在兔子後方 */
        }

        .char.visible {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1);
        }

        /* 上層：兔子與前景 (z-index: 20) */
        .foreground-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        /* 水彩濾鏡 */
        .watercolor-filter {
            filter: url(#watercolor);
        }
    </style>
</head>
<body>

    <!-- SVG 濾鏡定義 -->
    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
                <feGaussianBlur stdDeviation="1" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>
    </svg>

    <!-- 1. 最底層背景 -->
    <div class="background-layer"></div>

    <!-- 2. 中間層文字 -->
    <div class="story-text-container" id="textTarget">
        <!-- 文字由 JS 生成 -->
    </div>

    <!-- 3. 最上層兔子與前景 -->
    <div class="foreground-layer">
        <svg viewBox="0 0 800 600" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="background: transparent;">
            <!-- 地板 -->
            <path d="M 0 450 L 800 450" stroke="#1e293b" stroke-width="1" opacity="0.3" />
            <path d="M 0 600 L 320 450" stroke="#1e293b" stroke-width="1" opacity="0.2" />
            <path d="M 800 600 L 480 450" stroke="#1e293b" stroke-width="1" opacity="0.2" />

            <!-- 窗戶投射出的微弱光線 -->
            <path d="M 150 100 L 250 85 L 250 350 L 150 380 Z" fill="#ffffff" opacity="0.015" />
            <path d="M 150 450 L 400 580 L 650 580 L 320 450 Z" fill="#ffffff" opacity="0.03" />

            <!-- 水彩風小兔子 -->
            <g class="watercolor-filter" transform="translate(380, 420)">
                <!-- 兔子陰影 -->
                <ellipse cx="20" cy="45" rx="35" ry="10" fill="rgba(0,0,0,0.5)" />
                
                <linearGradient id="bunnyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
                </linearGradient>

                <!-- 耳朵 -->
                <ellipse cx="10" cy="-10" rx="6" ry="25" fill="url(#bunnyGrad)" transform="rotate(-5)" />
                <ellipse cx="30" cy="-10" rx="6" ry="25" fill="url(#bunnyGrad)" transform="rotate(5)" />
                
                <!-- 身體 -->
                <path d="M 0 42 Q 20 0 40 42 Z" fill="url(#bunnyGrad)" />
                <!-- 頭 -->
                <circle cx="20" cy="15" r="19" fill="url(#bunnyGrad)" />
                
                <!-- 眼睛 -->
                <circle cx="13" cy="15" r="1.2" fill="#0f172a" opacity="0.4" />
                <circle cx="27" cy="15" r="1.2" fill="#0f172a" opacity="0.4" />
                
                <!-- 尾巴 -->
                <circle cx="42" cy="38" r="5" fill="#f8fafc" />
            </g>
        </svg>
    </div>

    <!-- 4. 觸發滾動的空間 -->
    <div class="scroll-space"></div>

    <script>
        const storyText = "這是一個故事";
        const textTarget = document.getElementById('textTarget');

        // 初始化文字，將每個字包裝在 span 中
        storyText.split('').forEach((char, index) => {
            const span = document.createElement('span');
            span.textContent = char;
            span.className = 'char';
            // 讓每個字在橫向有一點偏移，從小兔子中心向兩側散開
            const offset = (index - (storyText.length-1)/2) * 50;
            span.style.transformOrigin = `${-offset}px center`;
            textTarget.appendChild(span);
        });

        const chars = document.querySelectorAll('.char');

        function updateScroll() {
            const scrollTop = window.scrollY;
            const windowHeight = window.innerHeight;
            const docHeight = document.documentElement.scrollHeight;
            
            // 計算滾動百分比 (0 到 1)
            const scrollPercent = scrollTop / (docHeight - windowHeight);

            // 讓文字在滾動的前 80% 內逐一出現
            const totalChars = chars.length;
            const progress = scrollPercent * (totalChars + 1);

            chars.forEach((char, index) => {
                // 如果滾動進度超過了該字的索引，則顯示
                if (progress > index + 0.5) {
                    char.classList.add('visible');
                } else {
                    char.classList.remove('visible');
                }
            });
        }

        window.addEventListener('scroll', updateScroll);
        // 初始化一次，防止重新整理後位置不對
        updateScroll();
    </script>
</body>
</html>
