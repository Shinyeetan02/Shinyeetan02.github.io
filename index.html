<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 設定響應式視窗，確保在手機與電腦上比例正確 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寂寞的小兔子 - 互動故事</title>
    <!-- 引入 Tailwind CSS 的 CDN 版本 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義字體與基礎背景，這部分用標準 CSS 處理細節 */
        body {
            background-color: #0a1221; /* 設定深藍色背景 */
            margin: 0; /* 移除瀏覽器預設邊距 */
            padding: 0; /* 移除瀏覽器預設內距 */
            overflow-x: hidden; /* 禁止左右滑動，避免出現橫向捲軸 */
            font-family: "Noto Sans TC", sans-serif; /* 使用繁體中文標準字體 */
        }

        /* 產生長度用的容器，讓使用者有空間可以「滾動」 */
        .scroll-space {
            height: 600vh; /* 設定為視窗高度的 6 倍，vh 代表 viewport height */
        }

        /* 底層背景層：固定在畫面，不隨滾動移動 */
        .background-layer {
            position: fixed; /* 固定定位，不隨頁面捲動 */
            top: 0; /* 對齊頂部 */
            left: 0; /* 對齊左側 */
            width: 100%; /* 寬度佔滿 100% */
            height: 100vh; /* 高度佔滿整個視窗 */
            z-index: 5; /* 圖層順序：最底層 */
            /* 使用放射狀漸層營造房間的深邃感 */
            background: radial-gradient(circle at 50% 50%, #0d1a30 0%, #050a14 100%);
            pointer-events: none; /* 穿透點擊，不干擾滑鼠滾動 */
        }

        /* 中間層：文字容器 */
        .story-text-container {
            position: fixed; /* 固定在螢幕上 */
            top: 30%; /* 垂直位置在視窗 30% 處 */
            left: 50%; /* 水平置中開始 */
            transform: translate(-50%, -50%); /* 抵消寬高，達成真正的水平垂直置中 */
            z-index: 10; /* 層級高於背景，但低於兔子 */
            display: flex; /* 使用彈性佈局排列文字 */
            gap: 20px; /* 文字之間的間距 */
            pointer-events: none; /* 穿透點擊 */
            white-space: nowrap; /* 強制文字不換行 */
        }

        /* 單個文字的初始狀態 */
        .char {
            color: rgba(255, 255, 255, 0.85); /* 半透明白色 */
            font-size: 3rem; /* 字體大小 */
            font-weight: 300; /* 字體粗細：細體 */
            letter-spacing: 0.5rem; /* 字間距 */
            opacity: 0; /* 初始完全透明 */
            filter: blur(15px); /* 初始模糊度 15px */
            /* 設定過渡動畫：當類別改變時，透明度、變形、濾鏡在 1 秒內平滑變化 */
            transition: opacity 1s ease, transform 1s ease, filter 1s ease;
            transform: scale(0.3); /* 初始縮小到 0.3 倍，看起來像從小兔子背後出現 */
        }

        /* 當 JS 加入 .visible 類別後的狀態 */
        .char.visible {
            opacity: 1; /* 變為不透明 */
            filter: blur(0px); /* 模糊消失，變清晰 */
            transform: scale(1); /* 恢復原始大小 */
        }

        /* 前景層：兔子與房間細節 */
        .foreground-layer {
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex; /* 使用 Flex */
            justify-content: center; /* 水平置中 */
            align-items: center; /* 垂直置中 */
            z-index: 20; /* 層級最高，位於文字上方 */
            pointer-events: none;
        }

        /* 套用 SVG 水彩濾鏡 */
        .watercolor-filter {
            filter: url(#watercolor);
        }
    </style>
</head>
<body>

    <!-- SVG 濾鏡區域：定義水彩的物理質感 -->
    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
                <!-- 產生碎形雜訊 (亂數顆粒) -->
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
                <!-- 根據雜訊扭曲圖形邊緣，造成水彩滲透的不規則感 -->
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
                <!-- 輕微的高斯模糊，模擬顏料化開 -->
                <feGaussianBlur stdDeviation="1" result="blur" />
                <!-- 將模糊後的結果與原始圖形合併 -->
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>
    </svg>

    <!-- 1. 底層背景層 -->
    <div class="background-layer"></div>

    <!-- 2. 中間層文字：由 JavaScript 動態填入字體 -->
    <div class="story-text-container" id="textTarget"></div>

    <!-- 3. 最上層：小兔子與房間環境 -->
    <div class="foreground-layer">
        <!-- SVG 視窗設定為 800x600 比例 -->
        <svg viewBox="0 0 800 600" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="background: transparent;">
            <!-- 地板線條：使用淡色 path 畫出空間感 -->
            <path d="M 0 450 L 800 450" stroke="#1e293b" stroke-width="1" opacity="0.3" />
            <path d="M 0 600 L 320 450" stroke="#1e293b" stroke-width="1" opacity="0.2" />
            <path d="M 800 600 L 480 450" stroke="#1e293b" stroke-width="1" opacity="0.2" />

            <!-- 窗戶光影：極低透明度的多邊形 -->
            <path d="M 150 100 L 250 85 L 250 350 L 150 380 Z" fill="#ffffff" opacity="0.015" />
            <path d="M 150 450 L 400 580 L 650 580 L 320 450 Z" fill="#ffffff" opacity="0.03" />

            <!-- 小兔子組合：套用水彩濾鏡並定位在下方 -->
            <g class="watercolor-filter" transform="translate(380, 420)">
                <!-- 兔子腳底下的陰影 -->
                <ellipse cx="20" cy="45" rx="35" ry="10" fill="rgba(0,0,0,0.5)" />
                
                <!-- 定義漸層色：從純白到淡藍灰 -->
                <linearGradient id="bunnyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
                </linearGradient>

                <!-- 兔子耳朵 -->
                <ellipse cx="10" cy="-10" rx="6" ry="25" fill="url(#bunnyGrad)" transform="rotate(-5)" />
                <ellipse cx="30" cy="-10" rx="6" ry="25" fill="url(#bunnyGrad)" transform="rotate(5)" />
                
                <!-- 兔子身體 -->
                <path d="M 0 42 Q 20 0 40 42 Z" fill="url(#bunnyGrad)" />
                <!-- 兔子頭部 -->
                <circle cx="20" cy="15" r="19" fill="url(#bunnyGrad)" />
                
                <!-- 兔子眼睛 -->
                <circle cx="13" cy="15" r="1.2" fill="#0f172a" opacity="0.4" />
                <circle cx="27" cy="15" r="1.2" fill="#0f172a" opacity="0.4" />
                
                <!-- 兔子尾巴 -->
                <circle cx="42" cy="38" r="5" fill="#f8fafc" />
            </g>
        </svg>
    </div>

    <!-- 4. 滾動觸發器：高度決定了捲動的總長度 -->
    <div class="scroll-space"></div>

    <script>
        const storyText = "這是一個故事"; // 想要顯示的文字
        const textTarget = document.getElementById('textTarget'); // 取得文字容器

        // 逐字處理：將字串拆開，每個字放進一個 <span>
        storyText.split('').forEach((char, index) => {
            const span = document.createElement('span'); // 創建新的 span 元素
            span.textContent = char; // 設定字元內容
            span.className = 'char'; // 套用基礎 CSS 類別
            
            // 計算每個字相對於中心的偏移量，讓它們從小兔子中心散開
            const offset = (index - (storyText.length-1)/2) * 50;
            // 設定變形起點，讓縮放效果看起來是從小兔子背後發散
            span.style.transformOrigin = `${-offset}px center`;
            textTarget.appendChild(span); // 加入 HTML 畫面中
        });

        const chars = document.querySelectorAll('.char'); // 選取所有處理好的文字元件

        // 滾動事件處理函數
        function updateScroll() {
            const scrollTop = window.scrollY; // 當前捲動的距離
            const windowHeight = window.innerHeight; // 瀏覽器視窗的高度
            const docHeight = document.documentElement.scrollHeight; // 整份文件的總高度
            
            // 計算當前的滾動百分比 (0 到 1 之間)
            const scrollPercent = scrollTop / (docHeight - windowHeight);

            // 設定文字出現的節奏 (總長度 + 1 的緩衝)
            const totalChars = chars.length;
            const progress = scrollPercent * (totalChars + 1);

            chars.forEach((char, index) => {
                // 邏輯：如果滾動進度大於該字的索引，就顯示它
                if (progress > index + 0.5) {
                    char.classList.add('visible'); // 加入 visible 類別，觸發 CSS 過渡動畫
                } else {
                    char.classList.remove('visible'); // 往回捲動時隱藏文字
                }
            });
        }

        // 監聽瀏覽器的滾動事件
        window.addEventListener('scroll', updateScroll);
        // 初始化呼叫一次，確保頁面重新整理時，位置與狀態是同步的
        updateScroll();
    </script>
</body>
</html>
